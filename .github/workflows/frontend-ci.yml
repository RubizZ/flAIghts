name: Frontend CI

on:
    pull_request:
        branches: [main]
        paths:
            - "frontend/**"

jobs:
    build:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: ./frontend

        steps:
            - uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "npm"
                  cache-dependency-path: "./frontend/package-lock.json"

            - name: Install dependencies
              run: npm ci

            - name: Build frontend
              run: npm run build
