services:
  mongodb:
    image: mongo:8
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: 1234
    volumes:
      - mongo_data:/data/db

  mailpit:
    image: axllent/mailpit
    ports:
      - 8025:8025 # Web UI
      - 1025:1025 # SMTP
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  minio:
    image: minio/minio
    ports:
      - 9000:9000 # API
      - 9001:9001 # Console
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  server:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - 3000:3000
      - 9229:9229
    depends_on:
      - mongodb
      - mailpit
      - minio
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./backend:/usr/src/app
      - backend_node_modules:/usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - MONGODB_URI=mongodb://root:1234@mongodb:27017/flAIghts?authSource=admin
      - JWT_SECRET=secret
      - JWT_EXPIRATION=30d
      - FRONTEND_URL=http://localhost:5173
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
      - SMTP_USER=any
      - SMTP_PASS=any
      - SMTP_FROM=flAIghts <noreply@flAIghts.local>
      - FLIGHT_CACHE_TTL_HOURS=${FLIGHT_CACHE_TTL_HOURS:-24}
      - S3_HOST=minio:9000
      - S3_PUBLIC_HOST=localhost:9000
      - S3_USE_SSL=false
      - S3_FORCE_PATH_STYLE=true
      - S3_BUCKET_NAME=flaights
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY_ID=admin
      - S3_SECRET_ACCESS_KEY=admin123

  website:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_BACKEND_API_BASE_URL: "http://localhost:3000"
    ports:
      - 5173:5173
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./frontend:/usr/src/app
      - frontend_node_modules:/usr/src/app/node_modules
    depends_on:
      - server

volumes:
  mongo_data:
  minio_data:
  backend_node_modules:
  frontend_node_modules:
